<div class="form">
    <h2>Ajouter / Modifier un profil</h2>
    <form method="POST" class="addProfile__form" onsubmit="event.preventDefault(); {{handler}}()">
        <select name="id" onchange="{{handlerSelect}}(this)">
            <option value="">— Nouveau profil —</option>
            {{options}}
        </select>
        <input type="text" name="name" placeholder="Nom du profil" required />
        <input type="text" name="image" placeholder="Nom de l'image (facultatif)" />
        <input type="number" name="restriction_age" placeholder="Âge minimum" required />

        <button type="submit">Valider</button>
    </form>
</div>
