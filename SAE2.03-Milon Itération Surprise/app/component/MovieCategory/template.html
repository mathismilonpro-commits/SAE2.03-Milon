<section class="movie-category flex-context flex-column gap-xs">
  <h2 class="movie-category__title">{{category}} →</h2>
  <div class="movie-category__carousel">
    <button class="movie-category__arrow movie-category__arrow--prev" aria-label="Précédent">&#8249;</button>
    <div class="movie-category__list flex-context flex-row gap-xs">
      {{movies}}
    </div>
    <button class="movie-category__arrow movie-category__arrow--next" aria-label="Suivant">&#8250;</button>
  </div>
</section>
