<div class="movie-detail flex-context flex-column">
  <button class="movie-detail__back" onclick="C.handlerMovies()"> Retour à la liste</button>
  <div class="movie-detail__body flex-context">
    <img
      class="movie-detail__image"
      src="../server/images/{{image}}"
      alt="{{name}}"
    />
    <div class="movie-detail__info flex-context flex-column gap-m">
      <div class="movie-detail__header flex-context flex-column">
        <h2 class="movie-detail__title">{{name}}</h2>
        <div class="movie-detail__time flex-context flex-row flex-wrap gap-m">
          <p class="movie-detail__dir">{{director}}</p>
          <p class="movie-detail__year">{{year}}</p>
          <p class="movie-detail__length">Durée: {{length}} min</p>
          <p class="movie-detail__category">{{category}}</p>
          <p class="movie-detail__age">Âge minimum: {{min_age}} ans</p>
        </div>
      </div>
      <p class="movie-detail__description">{{description}}</p>
      <label class="movie-detail__favorite">
        <input type="checkbox" onchange="{{handlerFavorite}}" {{favoriteChecked}}> Favoris
      </label>
      <iframe class="movie-detail__trailer" src="{{trailer}}" title="Bande-annonce" allowfullscreen></iframe>
    </div>
  </div>
</div>
