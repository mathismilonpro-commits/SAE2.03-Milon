      <li class="navbar__item" role="button" tabindex="0" onclick="{{hAbout}}">À PROPOS</li>
      <li class="navbar__item" role="button" tabindex="0" onclick="{{movies}}">FILMS</li>
      <li class="navbar__item" role="button" tabindex="0" onclick="{{hFavorites}}">FAVORIS</li>
      <li class="navbar__item" role="button" tabindex="0" onclick="{{hStats}}">STATS</li>
    </ul>
  </div>

  <div class="navbar__right flex-context gap-m">
    <div class="navbar__search-container">
      <input class="navbar__search" type="search" aria-label="Rechercher un film" placeholder="Rechercher un film…" onkeyup="C.handlerSearch(this.value)">
      <svg class="navbar__search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="10.5" cy="10.5" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/>
        <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <label for="search-toggle" class="navbar__search-toggle-btn" aria-label="Rechercher">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
          <circle cx="10.5" cy="10.5" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>

    <span class="navbar__profile" role="button" tabindex="0" onclick="{{hProfile}}">
      <svg class="navbar__profile-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="8" r="4" fill="currentColor"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" fill="currentColor"/>
      </svg>
      <span class="navbar__profile-label">{{profileLabel}}</span>

  <div class="navbar__search-overlay">
    <input class="navbar__search navbar__search--expanded" type="search" aria-label="Rechercher un film" placeholder="Rechercher un film…" onkeyup="C.handlerSearch(this.value)">

      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
        <line x1="4" y1="4" x2="20" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

      <li class="navbar__mobile-item" role="button" tabindex="0" onclick="document.getElementById('navbar-toggle').checked=false;{{hAbout}}">À PROPOS</li>
      <li class="navbar__mobile-item" role="button" tabindex="0" onclick="document.getElementById('navbar-toggle').checked=false;{{movies}}">FILMS</li>
      <li class="navbar__mobile-item" role="button" tabindex="0" onclick="document.getElementById('navbar-toggle').checked=false;{{hFavorites}}">FAVORIS</li>
