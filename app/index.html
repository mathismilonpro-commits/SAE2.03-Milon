<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP - Films</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content">
      <div id="movie-list-container" class="movie__container">
        <div id="movie-list" class="movie__list grid-context gap-m">
          <!-- Les cartes de films movie-card -->
        </div>
      </div>
      <div id="movie-detail-container" style="display: none;">
        <!-- Le détail d'un film -->
      </div>
    </section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { DataMovie } from "./data/dataMovie.js";

      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};

      C.handlerAbout = function () {
        alert(
          "SAE 2.03 - Plateforme VOD (Netflix-like)\nAffichage des films disponibles"
        );
      };

      C.handlerMovies = async function () {
        let movies = await DataMovie.requestMovies();
        V.renderMovies(movies);
      };

      C.handlerDetails = async function (id) {
        let movie = await DataMovie.requestMovieDetails(id);
        V.renderMovieDetails(movie);
      };


      C.start = function () {
        V.renderNavBar("C.handlerAbout()", "C.handlerMovies()");
        C.handlerMovies();
      };

      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderNavBar = function (hAbout, hMovies) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hAbout, hMovies);
      };

      V.renderMovies = function (movies) {
        let listContainer = document.querySelector("#movie-list-container");
        let detailContainer = document.querySelector("#movie-detail-container");
        
        listContainer.style.display = "block";
        detailContainer.style.display = "none";
        
        let content = document.querySelector("#movie-list");
        content.innerHTML = Movie.format(movies);
      };

      V.renderMovieDetails = function (movie) {
        let listContainer = document.querySelector("#movie-list-container");
        let detailContainer = document.querySelector("#movie-detail-container");
        
        listContainer.style.display = "none";
        detailContainer.style.display = "block";
        
        detailContainer.innerHTML = MovieDetail.format(movie);
      };

      C.start(); // Démarre l'application
    </script>
  </body>
</html>
