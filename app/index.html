<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP - Films</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <div id="profile-overlay" class="flex-context flex-center"></div>
    <div id="error"></div>

    <section id="content">
      <div id="movie-list-container" class="movie__container">
        <div id="movie-list" class="movie__list grid-context gap-m"></div>
      </div>
      <div id="movie-detail-container" style="display: none"></div>
      <div id="stats" class="stats__container"></div>
    </section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";
      import { DataProfile } from "./data/dataProfile.js";
      import { ProfileSelector } from "./component/ProfileSelector/script.js";
      import { DataFavorite } from "./data/dataFavorite.js";
      import { Notif } from "./component/Error/script.js";
      import { DataStats } from "./data/dataStats.js";
      import { Stats } from "./component/Stats/script.js";

      window.C = {};
      C.activeProfileId = null;
      C.activeProfileName = null;
      C.activeProfileAge = 0;
      C.activeFavorites = new Set(); // IDs des films favoris du profil actif

      C.handlerAbout = function () {
        alert(
          "SAE 2.03 - Plateforme VOD (Netflix-like)\nAffichage des films disponibles",
        );
      };

      C.handlerSelectProfile = async function (id, name, age) {
        C.activeProfileId = id;
        C.activeProfileName = name;
        C.activeProfileAge = age;
        let favorites = await DataFavorite.read(id);
        C.activeFavorites = new Set();
        for (let f of favorites) {
          C.activeFavorites.add(f.id);
        }
        document.querySelector("#profile-overlay").style.display = "none";
        V.renderNavBar("C.handlerAbout()", "C.handlerMovies()", "C.handlerChangeProfile()", name, "C.handlerFavorites()", "C.handlerStats()");
        await C.handlerMovies();
      };

      C.handlerChangeProfile = async function () {
        C.activeProfileId = null;
        C.activeProfileName = null;
        C.activeProfileAge = 0;
        C.activeFavorites = new Set();
        V.renderNavBar("C.handlerAbout()", "C.handlerMovies()", "C.handlerChangeProfile()", null, "C.handlerFavorites()", "C.handlerStats()");
        let profiles = await DataProfile.read();
        V.renderProfiles(profiles);
      };

      C.handlerDetails = async function (id) {
        let movie = await DataMovie.requestMovieDetails(id);
        let isFavorite = C.activeFavorites.has(movie.id);
        V.renderMovieDetails(movie, isFavorite);
      };

      C.handlerToggleFavorite = async function (movieId, checkbox) {
        if (!C.activeProfileId) {
          checkbox.checked = !checkbox.checked;
          Notif.show("Veuillez sélectionner un profil pour gérer vos favoris.");
          return;
        }
        if (checkbox.checked) {
          await DataFavorite.add(C.activeProfileId, movieId);
          C.activeFavorites.add(movieId);
        } else {
          await DataFavorite.remove(C.activeProfileId, movieId);
          C.activeFavorites.delete(movieId);
        }
      };

      C.handlerFavorites = async function () {
        if (!C.activeProfileId) {
          Notif.show("Veuillez sélectionner un profil pour voir vos favoris.");
          return;
        }
        let favorites = await DataFavorite.read(C.activeProfileId);
        V.renderFavorites(favorites);
      };

      C.handlerStats = async function () {
        let data = await DataStats.read();
        V.renderStats(data);
      };

      C.handlerMovies = async function () {
        let movies = await DataMovie.requestMoviesGroupedByCategory(C.activeProfileAge);
        V.renderMoviesByCategory(movies);
      };

      C.start = async function () {
        V.renderNavBar("C.handlerAbout()", "C.handlerMovies()", "C.handlerChangeProfile()", null, "C.handlerFavorites()", "C.handlerStats()");
        let [movies, profiles] = await Promise.all([
          DataMovie.requestMoviesGroupedByCategory(0),
          DataProfile.read()
        ]);
        V.renderMoviesByCategory(movies);
        V.renderProfiles(profiles);
      };

      window.V = {};

      V.showSection = function (sectionId) {
        document.querySelector("#movie-list-container").style.display = "none";
        document.querySelector("#movie-detail-container").style.display = "none";
        document.querySelector("#stats").style.display = "none";
        document.querySelector(sectionId).style.display = "block";
      };

      V.renderNavBar = function (hAbout, hMovies, hProfile, profileLabel, hFavorites, hStats) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hAbout, hMovies, hProfile, profileLabel, hFavorites, hStats);
      };

      V.renderStats = function (data) {
        V.showSection("#stats");
        document.querySelector("#stats").innerHTML = Stats.format(data);
      };

      V.renderProfiles = function (profiles) {
        let overlay = document.querySelector("#profile-overlay");
        overlay.innerHTML = ProfileSelector.format(profiles);
        overlay.style.display = "flex";
      };

      V.renderMovies = function (movies) {
        V.showSection("#movie-list-container");
        document.querySelector("#movie-list").innerHTML = Movie.format(movies);
      };

      V.renderMovieDetails = function (movie, isFavorite) {
        V.showSection("#movie-detail-container");
        document.querySelector("#movie-detail-container").innerHTML = MovieDetail.format(
          movie,
          `C.handlerToggleFavorite(${movie.id}, this)`,
          isFavorite
        );
      };

      V.renderFavorites = function (favorites) {
        V.showSection("#movie-list-container");
        let content = document.querySelector("#movie-list");
        if (favorites.length === 0) {
          Notif.show("Vous n'avez pas encore de film en favori.");
        } else {
          content.innerHTML = MovieCategory.format("♥ Mes favoris", favorites);
          MovieCategory.attachWheelListeners();
        }
      };

      V.renderMoviesByCategory = function (moviesByCategory) {
        V.showSection("#movie-list-container");
        let content = document.querySelector("#movie-list");
        let categories = Object.keys(moviesByCategory);
        if (categories.length === 0) {
          content.innerHTML = "";
          Notif.show("Aucun film disponible pour ce profil.");
          return;
        }
        let html = "";
        let i = 0;
        while (i < categories.length) {
          let categoryName = categories[i];
          let movies = moviesByCategory[categoryName];
          html += MovieCategory.format(categoryName, movies);
          i++;
        }
        content.innerHTML = html;
        MovieCategory.attachWheelListeners();
      };

      C.start();
    </script>
  </body>
</html>
