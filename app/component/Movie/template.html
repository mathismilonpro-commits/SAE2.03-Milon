<div class="movie flex-context flex-column" onclick="C.handlerDetails({{id}})">
  <img
    class="movie__image"
    src="../server/images/{{image}}"
    alt="{{name}}"
    onerror="this.classList.add('movie__image--missing'); this.removeAttribute('src');"
  />

  <h3 class="movie__title">{{name}}</h3>
</div>
